server:
  port: ${SERVER_PORT:9000}

spring:
  application:
    name: kafka-stream-gateway
  main:
    banner-mode: "off"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    avionica: INFO