server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: aerocontrol-dispatcher
  main:
    banner-mode: "off"
  sql:
    init:
      mode: never
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/avionica}
    username: ${SPRING_DATASOURCE_USERNAME:avionica}
    password: ${SPRING_DATASOURCE_PASSWORD:avionica_dev}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: aerocontrol-dispatcher
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

logging:
  level:
    root: WARN
    avionica: INFO
    org.apache.kafka: WARN